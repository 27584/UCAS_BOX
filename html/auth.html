<div class="auth-page lined-paper-bg">
    <div class="auth-card animate-paper-drop tape tape-tl">
        <div class="auth-header">
            <div class="auth-stamp-area">
                <div class="seal seal-lg">开<br>盒</div>
                <div class="postmark auth-postmark">
                    <span class="postmark-top">UCAS</span>
                    <span class="postmark-date">2026</span>
                    <span class="postmark-bottom">北京</span>
                </div>
            </div>
            <h1 class="typewriter-heading">UCAS_BOX</h1>
            <p class="handwritten">～ 开启你的收藏之旅 ～</p>
        </div>
        <div class="tabs" id="auth-tabs">
            <button class="tab-btn active" data-mode="login">登录</button>
            <button class="tab-btn" data-mode="register">注册</button>
        </div>
        <form id="auth-form" class="auth-form">
            <div class="form-group" id="nickname-group" style="display:none;">
                <label class="form-label">昵称</label>
                <input type="text" class="form-input" id="nickname" placeholder="你的昵称" />
            </div>
            <div class="form-group">
                <label class="form-label">邮箱</label>
                <input type="email" class="form-input" id="email" placeholder="you@example.com" required />
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" id="password" placeholder="至少6位密码" required />
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">
                <span id="auth-btn-text">登录</span>
            </button>
        </form>
        <div class="auth-footer">
            <div class="resend-section">
                <p class="resend-label handwritten">未收到验证邮件？</p>
                <div class="resend-row">
                    <input type="email" class="form-input" id="resend-email-input" placeholder="输入注册邮箱" />
                    <button type="button" class="btn btn-ghost" id="resend-email-btn">
                        <i data-lucide="send"></i>
                        <span>发送</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <!-- 角落手写批注 -->
    <div class="auth-margin-note handwritten ink-red">第 001 号 收藏册</div>
</div>
