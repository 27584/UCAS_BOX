<div class="collection-page">
    <div class="page-header">
        <h2><i data-lucide="book-open"></i> 收藏图鉴</h2>
        <div class="collection-progress" id="collection-progress">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <span class="progress-text" id="progress-text">加载中...</span>
        </div>
    </div>
    <div class="collection-filter">
        <select class="form-input" id="collection-filter-type" style="width:auto;">
            <option value="">全部类型</option>
            <option value="collection">收藏品</option>
            <option value="consumable">消耗品</option>
            <option value="equipment">装备</option>
            <option value="material">材料</option>
            <option value="currency">货币</option>
        </select>
        <select class="form-input" id="collection-filter-owned" style="width:auto;">
            <option value="">全部</option>
            <option value="owned">已拥有</option>
            <option value="unowned">未收集</option>
        </select>
    </div>
    <div class="item-grid" id="collection-grid">
        <div class="skeleton" style="height:140px;"></div>
        <div class="skeleton" style="height:140px;"></div>
        <div class="skeleton" style="height:140px;"></div>
        <div class="skeleton" style="height:140px;"></div>
    </div>
    <div class="pagination" id="collection-pagination"></div>
</div>
