<div class="admin-page">
    <div class="page-header">
        <h2><i data-lucide="shield"></i> 管理面板</h2>
    </div>

    <div class="admin-stats" id="admin-stats">
        <div class="stat-card">
            <div class="stat-icon"><i data-lucide="users"></i></div>
            <div class="stat-info">
                <span class="stat-number" id="stat-users">-</span>
                <span class="stat-label">用户</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i data-lucide="box"></i></div>
            <div class="stat-info">
                <span class="stat-number" id="stat-items">-</span>
                <span class="stat-label">收藏品</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i data-lucide="shopping-cart"></i></div>
            <div class="stat-info">
                <span class="stat-number" id="stat-orders">-</span>
                <span class="stat-label">订单</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i data-lucide="mail"></i></div>
            <div class="stat-info">
                <span class="stat-number" id="stat-mails">-</span>
                <span class="stat-label">邮件</span>
            </div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="users">用户管理</button>
        <button class="tab-btn" data-tab="items">物品管理</button>
        <button class="tab-btn" data-tab="submissions">投稿审核</button>
        <button class="tab-btn" data-tab="lottery">彩票管理</button>
    </div>

    <div class="tab-content" id="tab-users">
        <div class="user-list" id="user-list">
            <div class="skeleton" style="height:60px;"></div>
            <div class="skeleton" style="height:60px;"></div>
        </div>
    </div>

    <div class="tab-content" id="tab-items" style="display:none;">
        <div class="item-form card">
            <h3>添加收藏品</h3>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">名称</label>
                    <input type="text" class="form-input" id="item-name" placeholder="物品名称" />
                </div>
                <div class="form-group">
                    <label class="form-label">品质</label>
                    <select class="form-input" id="item-quality">
                        <option value="white">普通</option>
                        <option value="green">稀有</option>
                        <option value="blue">珍奇</option>
                        <option value="purple">史诗</option>
                        <option value="orange">传说</option>
                        <option value="red">神圣</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">描述</label>
                    <input type="text" class="form-input" id="item-desc" placeholder="物品描述" />
                </div>
                <div class="form-group">
                    <label class="form-label">权重（越小越稀有）</label>
                    <input type="number" class="form-input" id="item-weight" placeholder="100" value="100" />
                </div>
            </div>
            <button class="btn btn-primary" id="btn-add-item">
                <i data-lucide="plus"></i>
                <span>添加物品</span>
            </button>
        </div>

        <div class="item-list" id="item-list">
            <div class="skeleton" style="height:60px;"></div>
            <div class="skeleton" style="height:60px;"></div>
        </div>
    </div>

    <div class="tab-content" id="tab-submissions" style="display:none;">
        <div class="submission-list" id="submission-list-admin">
            <div class="skeleton" style="height:60px;"></div>
            <div class="skeleton" style="height:60px;"></div>
        </div>
    </div>

    <div class="tab-content" id="tab-lottery" style="display:none;">
        <div class="lottery-admin-card card">
            <h3>当前期次信息</h3>
            <div class="lottery-admin-info">
                <div class="info-row">
                    <span class="info-label">期次编号</span>
                    <span class="info-value" id="admin-lottery-round">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">奖池金额</span>
                    <span class="info-value" id="admin-lottery-pool">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">开奖号码</span>
                    <span class="info-value" id="admin-lottery-numbers">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">状态</span>
                    <span class="info-value" id="admin-lottery-status">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">截止时间</span>
                    <span class="info-value" id="admin-lottery-end">-</span>
                </div>
            </div>
            <button class="btn btn-primary" id="btn-admin-draw" style="margin-top:16px;">
                <i data-lucide="zap"></i>
                <span>立即开奖</span>
            </button>
        </div>

        <div class="lottery-admin-card card">
            <h3>Debug功能</h3>
            <div class="debug-section">
                <div class="debug-item">
                    <label class="debug-label">测试开奖号码（选填）</label>
                    <input type="text" class="form-input" id="debug-numbers" placeholder="如：A3F2D9" maxlength="6" />
                    <span class="debug-hint">不填写则随机生成</span>
                </div>
                <button class="btn btn-secondary" id="btn-debug-draw">
                    <i data-lucide="bug"></i>
                    <span>Debug开奖</span>
                </button>
            </div>
        </div>

        <div class="lottery-admin-card card">
            <h3>期次列表</h3>
            <div class="lottery-round-list" id="admin-lottery-list">
                <div class="skeleton" style="height:60px;"></div>
                <div class="skeleton" style="height:60px;"></div>
            </div>
        </div>
    </div>
</div>
