<div class="explore-page">
    <div class="explore-header">
        <h2><i data-lucide="map"></i> 世界探索</h2>
        <div class="explore-status">
            <span class="location-indicator" id="location-status">
                <i data-lucide="loader-2" class="spin"></i> 定位中...
            </span>
        </div>
    </div>

    <div class="explore-content">
        <div class="map-container" id="map-container">
            <div class="map-loading" id="map-loading">
                <i data-lucide="loader-2" class="spin"></i>
                <span>加载地图中...</span>
            </div>
            <div class="map-error" id="map-error" style="display:none;">
                <i data-lucide="alert-circle"></i>
                <span>无法加载地图，请检查网络</span>
            </div>
            <button class="sidebar-toggle-btn" id="sidebar-toggle-btn">
                <i data-lucide="list"></i>
            </button>
        </div>

        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <div class="explore-sidebar" id="explore-sidebar">
            <div class="explore-sidebar-header">
                <h3><i data-lucide="compass"></i> 探索点</h3>
                <span class="point-count" id="point-count">0</span>
            </div>
            <div class="explore-point-list" id="explore-point-list">
                <div class="explore-loading"><i data-lucide="loader-2" class="spin"></i> 加载中...</div>
            </div>
            <div class="explore-tips">
                <i data-lucide="info"></i>
                <span>靠近探索点可触发探索</span>
            </div>
        </div>
    </div>
</div>
