<div class="inventory-page">
    <div class="page-header">
        <h2><i data-lucide="backpack"></i> 我的背包</h2>
        <a href="#collection" class="btn btn-secondary" style="margin-bottom:12px;">
            <i data-lucide="book-open"></i>
            <span>查看图鉴</span>
        </a>
        <div class="filter-bar">
            <select class="form-input" id="inventory-filter-type" style="width:auto;margin-right:12px;">
                <option value="">全部类型</option>
                <option value="collection">收藏品</option>
                <option value="consumable">消耗品</option>
                <option value="equipment">装备</option>
                <option value="material">材料</option>
                <option value="currency">货币</option>
            </select>
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="white">普通</button>
            <button class="filter-btn" data-filter="green">稀有</button>
            <button class="filter-btn" data-filter="blue">珍奇</button>
            <button class="filter-btn" data-filter="purple">史诗</button>
            <button class="filter-btn" data-filter="orange">传说</button>
            <button class="filter-btn" data-filter="red">神圣</button>
        </div>
    </div>
    <div class="item-grid" id="inventory-grid">
        <div class="skeleton" style="height:140px;"></div>
        <div class="skeleton" style="height:140px;"></div>
        <div class="skeleton" style="height:140px;"></div>
        <div class="skeleton" style="height:140px;"></div>
    </div>
</div>
