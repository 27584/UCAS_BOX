<div class="inventory-page">
    <div class="page-header">
        <div class="page-header-row">
            <h2><i data-lucide="backpack"></i> 我的背包</h2>
            <div class="header-actions">
                <button class="btn btn-merge" id="btn-open-merge">
                    <i data-lucide="layers"></i>
                    <span>收藏品合成</span>
                </button>
                <a href="#collection" class="btn btn-secondary">
                    <i data-lucide="book-open"></i>
                    <span>查看图鉴</span>
                </a>
            </div>
        </div>
        <div class="filter-bar">
            <select class="form-input" id="inventory-filter-type" style="width:auto;margin-right:12px;">
                <option value="">全部类型</option>
                <option value="collection">收藏品</option>
                <option value="consumable">消耗品</option>
                <option value="equipment">装备</option>
                <option value="material">材料</option>
                <option value="currency">货币</option>
                <option value="seed">种子</option>
            </select>
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="white">普通</button>
            <button class="filter-btn" data-filter="green">稀有</button>
            <button class="filter-btn" data-filter="blue">珍奇</button>
            <button class="filter-btn" data-filter="purple">史诗</button>
            <button class="filter-btn" data-filter="orange">传说</button>
            <button class="filter-btn" data-filter="red">神圣</button>
        </div>
    </div>
    <div class="item-grid" id="inventory-grid">
        <div class="skeleton" style="height:140px;"></div>
        <div class="skeleton" style="height:140px;"></div>
        <div class="skeleton" style="height:140px;"></div>
        <div class="skeleton" style="height:140px;"></div>
    </div>
</div>

<!-- 合成弹窗 -->
<div id="merge-modal" class="modal" style="display:none;">
    <div class="modal-overlay" id="merge-overlay"></div>
    <div class="modal-content merge-modal-content">
        <button class="btn-close" id="merge-close"><i data-lucide="x"></i></button>
        <h3 class="merge-title"><i data-lucide="layers"></i> 收藏品合成</h3>
        
        <div class="merge-info">
            <span class="merge-hint">放入9个同品质收藏品，合成1个更高品质随机收藏品</span>
        </div>
        
        <!-- 九宫格 -->
        <div class="merge-grid" id="merge-grid">
            <div class="merge-slot" data-slot="0"></div>
            <div class="merge-slot" data-slot="1"></div>
            <div class="merge-slot" data-slot="2"></div>
            <div class="merge-slot" data-slot="3"></div>
            <div class="merge-slot" data-slot="4"></div>
            <div class="merge-slot" data-slot="5"></div>
            <div class="merge-slot" data-slot="6"></div>
            <div class="merge-slot" data-slot="7"></div>
            <div class="merge-slot" data-slot="8"></div>
        </div>
        
        <div class="merge-status" id="merge-status">
            已放入: <span id="merge-count">0</span>/9
            <span class="merge-quality" id="merge-quality"></span>
        </div>
        
        <button class="btn btn-merge-action" id="btn-do-merge" disabled>
            <i data-lucide="sparkles"></i>
            <span>开始合成</span>
        </button>
        
        <!-- 可选收藏品列表 -->
        <div class="merge-items-section">
            <div class="merge-items-header">
                <span>选择收藏品</span>
                <span class="merge-items-hint">点击添加到上方空格</span>
            </div>
            <div class="merge-items-list" id="merge-items-list"></div>
        </div>
    </div>
</div>
