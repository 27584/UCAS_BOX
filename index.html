<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>快来开盒朕欲萎喵喵喵</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Caveat:wght@400;600&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/pages/authPage.css">
    <link rel="stylesheet" href="css/pages/lobbyPage.css">
    <link rel="stylesheet" href="css/pages/idlePage.css">
    <link rel="stylesheet" href="css/pages/activityPage.css">
    <link rel="stylesheet" href="css/pages/inventoryPage.css">
    <link rel="stylesheet" href="css/pages/marketPage.css">
    <link rel="stylesheet" href="css/pages/collectionPage.css">
    <link rel="stylesheet" href="css/pages/profilePage.css">
    <link rel="stylesheet" href="css/pages/togglePage.css">
    <link rel="stylesheet" href="css/pages/mailPage.css">
    <link rel="stylesheet" href="css/pages/adminPage.css">
    <link rel="stylesheet" href="css/pages/submitPage.css">
    <link rel="stylesheet" href="css/pages/market-filterPage.css">
    <link rel="stylesheet" href="css/pages/commentsPage.css">
    <link rel="stylesheet" href="css/pages/userPage.css">
    <link rel="stylesheet" href="css/pages/postPage.css">
    <link rel="stylesheet" href="css/pages/messagePage.css">
    <link rel="stylesheet" href="css/pages/followPage.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        #buy-modal #market-buy-quantity-selector {
            display: flex !important;
            flex-direction: row !important;
            align-items: center !important;
            justify-content: space-between !important;
            padding: 0 !important;
            background: transparent !important;
            border: none !important;
            margin-bottom: 10px !important;
            width: 100% !important;
        }
        #buy-modal #market-buy-quantity-label {
            font-family: var(--font-mono) !important;
            font-size: 0.75rem !important;
            text-transform: uppercase !important;
            letter-spacing: 2px !important;
            color: var(--ink-soft) !important;
            flex-shrink: 0 !important;
            white-space: nowrap !important;
            display: inline-flex !important;
            margin: 0 !important;
        }
        #buy-modal #market-buy-quantity-controls {
            display: flex !important;
            flex-direction: row !important;
            align-items: center !important;
            gap: 0 !important;
            border: 2px solid var(--ink) !important;
            box-shadow: 2px 2px 0 var(--ink) !important;
        }
        #buy-modal #market-buy-quantity-controls input {
            width: 50px !important;
            height: 34px !important;
            text-align: center !important;
            font-family: var(--font-mono) !important;
            font-size: 1rem !important;
            font-weight: 700 !important;
            color: var(--ink) !important;
            background: var(--paper-card) !important;
            border: none !important;
            border-left: 2px solid var(--ink) !important;
            border-right: 2px solid var(--ink) !important;
            border-radius: 0 !important;
            -moz-appearance: textfield !important;
            outline: none !important;
        }
        #buy-modal #market-buy-quantity-controls input::-webkit-outer-spin-button,
        #buy-modal #market-buy-quantity-controls input::-webkit-inner-spin-button { -webkit-appearance: none !important; margin: 0 !important; }
        #buy-modal .market-qty-btn {
            width: 34px !important;
            height: 34px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            background: var(--paper-card) !important;
            border: none !important;
            color: var(--ink) !important;
            cursor: pointer !important;
            border-radius: 0 !important;
            font-size: 0.9rem !important;
            font-weight: 700 !important;
        }
        #buy-modal .market-qty-btn:hover {
            background: var(--ink) !important;
            color: var(--paper-card) !important;
        }
        #buy-modal .market-qty-btn svg {
            width: 14px !important;
            height: 14px !important;
        }
        .buy-modal-card {
            text-align: left !important;
        }
        .buy-modal-card .buy-header h3,
        .buy-modal-card .buy-item-info,
        .buy-modal-card .buy-hint {
            text-align: center !important;
        }
        #buy-modal .buy-footer {
            display: flex !important;
            justify-content: flex-end !important;
            gap: 10px !important;
        }
        #buy-modal .buy-footer .btn {
            flex: none !important;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0",
            "lucide": "https://esm.sh/lucide@0.294.0",
            "chart.js": "https://esm.sh/chart.js@4.4.0"
        }
    }
    </script>
</head>
<body>
    <div id="app">
        <!-- 顶部导航 -->
        <header class="top-nav" id="top-nav" style="display:none;">
            <div class="nav-brand">
                <span class="logo-icon">盒</span>
                <span class="logo-text">UCAS&nbsp;BOX</span>
            </div>
            <nav class="nav-links">
                <a href="#lobby" data-route="lobby" class="nav-link">
                    <i data-lucide="box"></i>
                    <span>开盒</span>
                </a>
                <a href="#activity" data-route="activity" class="nav-link nav-link-activity">
                    <i data-lucide="gift"></i>
                    <span>活动</span>
                </a>
                <a href="#feed" data-route="feed" class="nav-link">
                    <i data-lucide="message-circle"></i>
                    <span>动态</span>
                </a>
                <a href="#idle" data-route="idle" class="nav-link">
                    <i data-lucide="clock"></i>
                    <span>挂机</span>
                </a>
                <a href="#inventory" data-route="inventory" class="nav-link">
                    <i data-lucide="backpack"></i>
                    <span>背包</span>
                </a>
                <a href="#market" data-route="market" class="nav-link">
                    <i data-lucide="store"></i>
                    <span>市场</span>
                </a>
                <a href="#message" data-route="message" class="nav-link" id="nav-message">
                    <i data-lucide="message-circle"></i>
                    <span>消息</span>
                    <span class="badge" id="mail-badge" style="display:none;"></span>
                </a>
                <a href="#profile" data-route="profile" class="nav-link">
                    <i data-lucide="user"></i>
                    <span>我的</span>
                </a>
                <a href="#admin" data-route="admin" class="nav-link" id="nav-admin" style="display:none;">
                    <i data-lucide="shield"></i>
                    <span>管理</span>
                </a>
            </nav>
            <div class="nav-user">
                <span class="shell-badge">
                    <i data-lucide="coins"></i>
                    <span id="global-shells">0</span>
                </span>
            </div>
        </header>

        <!-- 邮箱未验证提示 -->
        <div id="email-unverified-banner" class="email-banner" style="display:none;">
            <div class="email-banner-content">
                <i data-lucide="alert-circle"></i>
                <div class="email-banner-text">
                    <span>您的邮箱 <strong id="unverified-email"></strong> 尚未验证</span>
                    <small>验证邮箱后可正常使用所有功能</small>
                </div>
            </div>
            <button class="btn btn-small" id="resend-verification-btn" onclick="resendVerificationEmail()">
                <i data-lucide="send"></i>
                重新发送验证邮件
            </button>
            <button class="email-banner-close" onclick="document.getElementById('email-unverified-banner').style.display='none'">
                <i data-lucide="x"></i>
            </button>
        </div>

        <!-- 主内容区 -->
        <main id="main-content"></main>

        <!-- 底部导航（移动端） -->
        <nav class="bottom-nav" id="bottom-nav" style="display:none;">
            <a href="#lobby" data-route="lobby" class="nav-link">
                <i data-lucide="box"></i>
                <span>开盒</span>
            </a>
            <a href="#activity" data-route="activity" class="nav-link nav-link-activity">
                <i data-lucide="gift"></i>
                <span>活动</span>
            </a>
            <a href="#feed" data-route="feed" class="nav-link">
                <i data-lucide="message-circle"></i>
                <span>动态</span>
            </a>
            <a href="#idle" data-route="idle" class="nav-link">
                <i data-lucide="clock"></i>
                <span>挂机</span>
            </a>
            <a href="#inventory" data-route="inventory" class="nav-link">
                <i data-lucide="backpack"></i>
                <span>背包</span>
            </a>   
            <a href="#market" data-route="market" class="nav-link">
                <i data-lucide="store"></i>
                <span>市场</span>
            </a>
            <a href="#message" data-route="message" class="nav-link">
                <i data-lucide="message-circle"></i>
                <span>消息</span>
            </a>
            <a href="#profile" data-route="profile" class="nav-link">
                <i data-lucide="user"></i>
                <span>我的</span>
            </a>
            <a href="#admin" data-route="admin" class="nav-link" id="nav-admin-bottom" style="display:none;">
                <i data-lucide="shield"></i>
                <span>管理</span>
            </a>
        </nav>
    </div>

    <!-- 通知弹窗 -->
    <div id="notification-modal" class="modal" style="display:none;">
        <div class="modal-overlay" id="notification-overlay"></div>
        <div class="modal-content notification-panel">
            <button class="btn-close" id="notification-close"><i data-lucide="x"></i></button>
            <h3><i data-lucide="bell"></i> 回复通知</h3>
            <div class="notification-list" id="notification-list">
                <div class="notification-loading">加载中...</div>
            </div>
            <button class="btn btn-secondary btn-mark-all" id="btn-mark-all-read" style="width:100%;margin-top:12px;">
                <i data-lucide="check"></i>
                全部标记已读
            </button>
        </div>
    </div>

    <!-- 全局消息提示 -->
    <div id="toast-container"></div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
